[example_1]
other = "./udf ./image.tar"

[example_2]
other = "./udf ./image.tar.gz"

[example_3]
other = "./udf ./image.zip"

[example_4]
other = "./udf ./repo/*.tar"

[example_5]
other = "./udf './repo/*.{tar,tar.gz,zip}'"

[example_6]
other = "./udf ./repo"

[example_7]
other = "./udf -o ./output ./image.tar"

[example_8]
other = "./udf ./image.tar ./repo/*.tar -o ./output"

[example_9]
other = "./udf -t repo/app:latest ./image.tar"

[example_10]
other = "./udf -i 1 ./image.tar"

[example_11]
other = "./udf -f -o ./output ./image.tar"
