[cmd_short]
other = "Extract Harbor or docker-save image archives into a merged rootfs"

[help_usage]
other = "Usage:"

[help_desc]
other = "Description:"

[help_desc_text]
other = "Extract Harbor or docker-save image archives into a merged rootfs.\nInput may be a single tar/tar.gz/tgz/zip file, a directory, or a glob pattern. All matched supported archives are processed in order."

[help_flags]
other = "Flags:"

[help_examples]
other = "Examples:"

[help_output]
other = "Output:"

[help_output_text]
other = "By default, output goes to a same-named directory beside the input file.\nWhen -o/--output is set, a same-named subdirectory is created under that directory.\nIf one archive contains multiple images, an additional subdirectory based on RepoTag or index is created."

[help_notes]
other = "Notes:"

[help_notes_text]
other = "Directory input scans only the top level and is not recursive.\nIn batch mode, a failure in one file does not stop the others."

[flag_help]
other = "Show help information"

[flag_output]
other = "Output parent directory; a same-named subdirectory will be created. Defaults to the input file's directory"

[flag_image_index]
other = "Select the image by its index in the manifest.json array, for example 0, 1, or 2. Useful when the archive contains multiple images, though -t is usually easier to use"

[flag_repo_tag]
other = "Select the image by RepoTag from manifest.json, for example repo/app:latest. This is usually more intuitive than -i and is recommended. If the archive contains multiple images and no selection is provided, available tags will be listed"

[flag_buffer_size]
other = "Buffer size in bytes used when copying files"

[flag_force]
other = "Force writing into an existing non-empty target directory without clearing it first"

[flag_no_progress]
other = "Disable dynamic progress bar"

[flag_lang]
other = "UI language, supported: zh or en"

[err_selection_conflict]
other = "use only one image selection option: --image-index/-i or --repo-tag/-t"

[err_invalid_buffer]
other = "invalid buffer size: {{.Value}}"

[err_no_supported_archive]
