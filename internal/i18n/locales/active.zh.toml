[help_usage]
other = "用法:"

[help_desc]
other = "说明:"

[help_desc_text]
other = "将 Harbor 或 docker save 导出的镜像包还原为合并后的 rootfs。\n输入可以是单个 tar/tar.gz/tgz/zip、目录，或通配符模式，程序会顺序处理所有匹配到的支持格式文件。"

[help_flags]
other = "选项:"

[help_examples]
other = "示例:"

[help_output]
other = "输出规则:"

[help_output_text]
other = "默认输出到输入文件所在目录下的“镜像同名目录”\n指定 -o/--output 时，会在该目录下创建“镜像同名目录”\n如果同一归档中有多个镜像，会继续按 RepoTag 或 index 创建子目录"

[help_notes]
other = "说明补充:"

[help_notes_text]
other = "目录输入只扫描当前一层，不递归子目录\n批量模式下，单个文件失败不会中断其他文件处理"

[flag_help]
other = "显示帮助信息"

[flag_output]
other = "输出父目录路径，实际会在其下创建同名子目录；默认输出到输入文件所在目录"

[flag_image_index]
other = "按 manifest.json 数组中的序号选择镜像，例如 0、1、2；当同一归档里有多个镜像时可使用，通常更推荐使用 -t 按 RepoTag 选择"

[flag_repo_tag]
other = "按 manifest.json 中的 RepoTags 选择镜像，例如 repo/app:latest；比 -i 更直观，推荐优先使用；如果同一归档里有多个镜像且未指定，程序会列出可选 tag"

[flag_buffer_size]
other = "文件复制时使用的缓冲区大小，单位字节"

[flag_force]
other = "强制写入已存在的非空目标目录，不预先清空"

[flag_no_progress]
other = "禁用动态进度条"

[flag_lang]
other = "界面语言，可选 zh 或 en"

